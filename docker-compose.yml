services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:19092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "19092:19092"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    ports:
      - "18085:8080"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_started
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "8081:8081"

  localstack:
    image: localstack/localstack:3.7
    container_name: localstack
    environment:
      - SERVICES=ssm
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "4566:4566"

  localstack-seed:
    image: amazon/aws-cli:2.17.50
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/seed-localstack.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT=http://localstack:4566
      - MATERIALS_ROOT=/materials
    volumes:
      - ./enterprise-materials:/materials:ro
      - ./scripts:/scripts:ro

  cert-sync:
    image: amazon/aws-cli:2.17.50
    depends_on:
      localstack-seed:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/scripts/sync-certs-from-localstack.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT=http://localstack:4566
    volumes:
      - certs-data:/shared/certs
      - ./scripts:/scripts:ro

  pgp-sync:
    image: amazon/aws-cli:2.17.50
    depends_on:
      localstack-seed:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/scripts/sync-pgp-from-localstack.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT=http://localstack:4566
    volumes:
      - pgp-data:/shared/pgp
      - ./scripts:/scripts:ro

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-seed:
    image: minio/mc:RELEASE.2024-07-31T15-58-33Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=employee-data
    volumes:
      - ./scripts:/scripts:ro
      - ./mock-server/data:/seed:ro

  employee-data-generator:
    build:
      context: ./mock-server
    container_name: employee-data-generator
    depends_on:
      minio:
        condition: service_started
      minio-seed:
        condition: service_completed_successfully
    command:
      - python
      - -u
      - generate_employees.py
      - --count
      - "200"
      - --start-id
      - "1001"
      - --output
      - data/employees.json
      - --interval-seconds
      - ${EMPLOYEE_GENERATOR_INTERVAL_SECONDS:-10}
      - --minio-endpoint
      - http://minio:9000
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=employee-data
      - MINIO_OBJECT=employees.json
      - MINIO_ATTACH_RANDOM_NAME=true
      - MINIO_RANDOM_PREFIX=attachments
      - EMPLOYEE_GENERATOR_INTERVAL_SECONDS=${EMPLOYEE_GENERATOR_INTERVAL_SECONDS:-10}
    volumes:
      - ./mock-server/data:/app/data
    restart: unless-stopped

  mock-pgp-api:
    build:
      context: ./mock-server
    container_name: mock-pgp-api
    depends_on:
      cert-sync:
        condition: service_completed_successfully
      pgp-sync:
        condition: service_completed_successfully
      employee-data-generator:
        condition: service_started
      minio-seed:
        condition: service_completed_successfully
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=employee-data
      - MINIO_OBJECT=employees.json
    volumes:
      - certs-data:/shared/certs:ro
      - pgp-data:/shared/pgp:ro
    ports:
      - "8443:8443"

  pgp-client:
    build:
      context: .
    container_name: pgp-client
    depends_on:
      kafka:
        condition: service_started
      schema-registry:
        condition: service_healthy
      cert-sync:
        condition: service_completed_successfully
      pgp-sync:
        condition: service_completed_successfully
      mock-pgp-api:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    volumes:
      - certs-data:/shared/certs:ro
      - pgp-data:/shared/pgp:ro

volumes:
  certs-data:
  pgp-data:
